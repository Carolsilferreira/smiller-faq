<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FAQ • Smiller</title>
  <link rel="stylesheet" href="style.css" />
</head>
  
<div id="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center;">
  
  <div style="background:white; padding:20px; border-radius:10px; width:90%; max-width:500px;">
    
    <h3 id="modalTitulo">Nova pergunta</h3>

    <input id="modalPergunta" placeholder="Digite a pergunta" style="width:100%; margin-bottom:10px; padding:8px;" />

    <textarea id="modalResposta" placeholder="Digite a resposta" style="width:100%; height:150px; padding:8px;"></textarea>

    <div style="margin-top:10px; display:flex; gap:10px;">
      <button onclick="salvarModal()">Salvar</button>
      <button onclick="fecharModal()">Cancelar</button>
    </div>

  </div>
</div>

  
<body>

  <h1>FAQ • ALINHADORES SMILLER</h1>

  <img 
    src="logo.png" 
    alt="Logo Smiller" 
    style="height:60px; display:block; margin:10px auto;"
  >

  <div class="search-area">
    <input 
      id="busca" 
      placeholder="Digite para pesquisar (ex.: prazo, placa, ajuste...)" 
      oninput="filtrar()" 
    />
    <button id="btnNovaPergunta" class="nova-btn" type="button">
      + Nova pergunta
    </button>
    
  </div>
  
  <div id="faqs"></div>

  <p class="muted"></p>

  <!-- SUPABASE (tem que vir antes do script.js) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- SEU SCRIPT -->
  <script src="script.js"></script>

</body>
</html>
