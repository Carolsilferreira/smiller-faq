<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FAQ • Smiller</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <h1>FAQ • ALINHADORES SMILLER</h1>

  <img 
    src="logo.png" 
    alt="Logo Smiller" 
    style="height:60px; display:block; margin:10px auto;"
  >

  <div class="search-area">
    <input 
      id="busca" 
      placeholder="Digite para pesquisar (ex.: prazo, placa, ajuste...)" 
      oninput="filtrar()" 
    />
    <button id="btnNovaPergunta" class="nova-btn" type="button">
      + Nova pergunta
    </button>
    
   <button onclick="importarPerguntas()" style="margin-top:10px;">
    Importar perguntas iniciais
  </button>

  </div>
  
  <div id="faqs"></div>

  <p class="muted"></p>

  <!-- SUPABASE (tem que vir antes do script.js) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- SEU SCRIPT -->
  <script src="script.js"></script>

</body>
</html>
